name: Agent-first gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  agent-check:
    name: Agent-first gate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check

      - name: Tests
        run: pnpm test

      - name: Architecture check
        run: pnpm architecture:check

      - name: Documentation check
        run: pnpm docs:check

      - name: Agent check
        run: pnpm agent:check

      - name: Database integrity check
        if: ${{ env.DATABASE_URL != '' }}
        run: pnpm db:check-integrity

      - name: Database integrity check skipped
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "DATABASE_URL not available; pnpm db:check-integrity skipped."
