name: Refresh pnpm lockfile

on:
  push:
    branches:
      - codex/openai-migration-phase-2

permissions:
  contents: write

jobs:
  refresh-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: codex/openai-migration-phase-2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Refresh lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile

      - name: Commit updated lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "pnpm-lock.yaml already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: refresh pnpm lockfile for OpenAI provider"
          git push
